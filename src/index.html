<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title><%= htmlWebpackPlugin.options.title %></title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <div class="main-container">
      <!-- <div class="frame-num">
        <div class="label">Frame number:</div>
        <div class="value">0</div>
      </div>
      <div class="seconds-passed">
        <div class="label">Seconds passed:</div>
        <div class="value">0</div>
      </div>
      <div class="direction">
        <div class="label">Direction:</div>
        <div class="value"></div>
      </div> -->
      <div id="canvas-container"></div>

      <div class="touch-controls" aria-hidden="true">
        <div class="touch-controls__dpad" role="group" aria-label="Movement controls">
          <button class="touch-btn touch-btn--up" data-dir="up" type="button" aria-label="Move up">▲</button>
          <button class="touch-btn touch-btn--left" data-dir="left" type="button" aria-label="Move left">◀</button>
          <button class="touch-btn touch-btn--down" data-dir="down" type="button" aria-label="Move down">▼</button>
          <button class="touch-btn touch-btn--right" data-dir="right" type="button" aria-label="Move right">▶</button>
        </div>
        <div class="touch-controls__actions" role="group" aria-label="Action controls">
          <button class="touch-btn touch-btn--action" data-action="interact" type="button" aria-label="Interact">
            A
          </button>
          <button class="touch-btn touch-btn--action" data-action="switch" type="button" aria-label="Switch character">
            B
          </button>
        </div>
      </div>

      <div class="store">
        <div class="label">Store:</div>
        <div class="value"></div>
      </div>
    </div>
  </body>
</html>
