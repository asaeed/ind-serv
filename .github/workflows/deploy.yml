name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # manual runs from the Actions tab

permissions:
  contents: write # push the built site to the gh-pages branch

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build # NODE_ENV=production webpack -> dist/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: indenturedgame.com # custom domain; also keeps Pages settings pinned across deploys
